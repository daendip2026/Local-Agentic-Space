name: Kernel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast lint gate — no C++ build required, fails in ~30s on formatting issues
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: Format Check
      run: cargo fmt --all -- --check

  # Full build + lint + test — parallelized across OS matrix
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libclang-dev

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      run: choco install llvm cmake --yes
      # LLVM provides libclang for bindgen, cmake for llama.cpp build

    - name: Set LIBCLANG_PATH (Windows)
      if: runner.os == 'Windows'
      run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $env:GITHUB_ENV

    - name: Cache Rust & C++ Build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'third_party/llama.cpp/.git') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Clippy Lints
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    - name: Run Tests
      run: cargo test --workspace --verbose
